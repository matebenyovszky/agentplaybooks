# ============================================
# AgentPlaybooks - Docker Compose (PostgreSQL)
# Full-stack deployment with local database
# ============================================

services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: agentplaybooks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentplaybooks"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- AgentPlaybooks Application ---
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database (Drizzle ORM)
      DB_DIALECT: postgres
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@postgres:5432/agentplaybooks
      # Supabase Auth (required for user login)
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Secrets encryption
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}

volumes:
  pgdata:
